<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Điểm Sinh Viên</title>
    <link rel="stylesheet" href="1_1.css">
</head>
<body>

    <h2>Quản lý Điểm Sinh Viên</h2>

    <div class="input-group">
        <input type="text" id="hoTen" placeholder="Họ tên sinh viên">
        <input type="number" id="diem" placeholder="Điểm (0 - 10)" min="0" max="10" step="0.1">
        <button id="btnThem">Thêm</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="bangSinhVien">
            </tbody>
    </table>

    <div class="stats">
        <p>Tổng số sinh viên: <span id="tongSV">0</span></p>
        <p>Điểm trung bình cả lớp: <span id="diemTB">0.00</span></p>
    </div>

    <script src="1_1.js"></script>
</body>
</html>
